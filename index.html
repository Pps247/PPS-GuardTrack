<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPS GuardTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F1EFE8;min-height:100vh}
:root{
  --teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --text:#2C2C2A;--text2:#5F5E5A;--text3:#888780;
  --bg:#F1EFE8;--surface:#fff;--border:#D3D1C7;
}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.header{background:#1a1a18;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:10px}
.logo-circle{width:38px;height:38px;border-radius:50%;background:var(--teal-mid);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;letter-spacing:0.5px}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:11px;color:#888;margin-top:1px}
.lang-row{display:flex;gap:5px}
.lang-btn{background:transparent;border:1px solid #444;color:#bbb;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.lang-btn.active{background:var(--teal-mid);border-color:var(--teal-mid);color:#fff}

.kiosk{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px}

.name-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.name-label{font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);padding:12px 16px 4px;text-transform:uppercase}
.name-input{width:100%;border:none;outline:none;padding:6px 16px 14px;font-size:20px;font-family:inherit;color:var(--text);background:transparent}
.name-input::placeholder{color:#ccc}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{border-radius:12px;border:1.5px solid;padding:20px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:inherit;font-size:15px;font-weight:600;transition:all 0.15s;background:var(--surface)}
.action-btn:active{transform:scale(0.97)}
.action-btn .ico{font-size:24px}
.btn-signin{border-color:var(--teal);color:var(--teal)}
.btn-signin:hover{background:var(--teal-light)}
.btn-signout{border-color:var(--red);color:var(--red)}
.btn-signout:hover{background:var(--red-light)}
.btn-lunch{border-color:var(--amber);color:var(--amber)}
.btn-lunch:hover{background:var(--amber-light)}
.btn-lunchend{border-color:var(--blue);color:var(--blue)}
.btn-lunchend:hover{background:var(--blue-light)}

.toast{border-radius:8px;padding:11px 16px;font-size:13px;font-weight:500;display:none;text-align:center;transition:all 0.2s}
.toast.show{display:block}
.toast.ok{background:var(--teal-light);color:var(--teal)}
.toast.err{background:var(--red-light);color:var(--red)}

.log-section{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.log-header{padding:11px 16px;font-size:10px;font-weight:600;letter-spacing:1.2px;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border)}
.log-list{max-height:200px;overflow-y:auto}
.log-item{padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.log-item:last-child{border-bottom:none}
.log-name{font-size:14px;font-weight:500;color:var(--text)}
.log-time{font-size:12px;color:var(--text3);margin-top:2px}
.log-badge{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:600}
.b-signin{background:var(--teal-light);color:var(--teal)}
.b-signout{background:var(--red-light);color:var(--red)}
.b-lunchout{background:var(--amber-light);color:var(--amber)}
.b-lunchin{background:var(--blue-light);color:var(--blue)}
.log-empty{padding:24px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="logo-circle">PPS</div>
      <div>
        <div class="header-title">GuardTrack</div>
        <div class="header-sub">Workforce Time Tracker</div>
      </div>
    </div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('es',this)">ES</button>
      <button class="lang-btn" onclick="setLang('fa',this)">FA</button>
      <button class="lang-btn" onclick="setLang('hi',this)">HI</button>
    </div>
  </div>

  <div class="kiosk">
    <div class="name-wrap">
      <div class="name-label" id="lbl-checkin">EMPLOYEE CHECK-IN</div>
      <input class="name-input" id="name-input" placeholder="Type your name..."/>
    </div>

    <div class="btn-grid">
      <button class="action-btn btn-signin" onclick="doAction('signin')">
        <span class="ico">→</span>
        <span id="lbl-signin">Sign in</span>
      </button>
      <button class="action-btn btn-signout" onclick="doAction('signout')">
        <span class="ico">←</span>
        <span id="lbl-signout">Sign out</span>
      </button>
      <button class="action-btn btn-lunch" onclick="doAction('lunch-out')">
        <span class="ico">☕</span>
        <span id="lbl-lunch">Lunch start</span>
      </button>
      <button class="action-btn btn-lunchend" onclick="doAction('lunch-in')">
        <span class="ico">↩</span>
        <span id="lbl-lunchend">Lunch end</span>
      </button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="log-section">
      <div class="log-header" id="lbl-todaylog">TODAY'S LOG</div>
      <div class="log-list" id="log-list">
        <div class="log-empty" id="lbl-empty">No entries yet today</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://osvhctmanjpctllczvoh.supabase.co";
const SUPABASE_KEY = "sb_publishable_6w042gSmkibQemUZKIFQ-A_R9wqTEmU";

const LANGS = {
  en:{checkin:"EMPLOYEE CHECK-IN",signin:"Sign in",signout:"Sign out",lunch:"Lunch start",lunchend:"Lunch end",todaylog:"TODAY'S LOG",empty:"No entries yet today",placeholder:"Type your name...",saved:"saved",failed:"Save failed — check connection"},
  es:{checkin:"REGISTRO DE EMPLEADO",signin:"Entrada",signout:"Salida",lunch:"Inicio almuerzo",lunchend:"Fin almuerzo",todaylog:"REGISTRO DE HOY",empty:"Sin entradas hoy",placeholder:"Escribe tu nombre...",saved:"guardado",failed:"Error al guardar"},
  fa:{checkin:"ورود کارمند",signin:"ورود",signout:"خروج",lunch:"شروع ناهار",lunchend:"پایان ناهار",todaylog:"گزارش امروز",empty:"هیچ ورودی امروز نیست",placeholder:"نام خود را بنویسید...",saved:"ذخیره شد",failed:"خطا در ذخیره"},
  hi:{checkin:"कर्मचारी चेक-इन",signin:"साइन इन",signout:"साइन आउट",lunch:"लंच शुरू",lunchend:"लंच खत्म",todaylog:"आज का लॉग",empty:"आज कोई प्रविष्टि नहीं",placeholder:"अपना नाम लिखें...",saved:"सहेजा गया",failed:"सहेजना विफल"}
};

let lang = 'en';
let localLog = [];

function setLang(l, btn){
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const t = LANGS[l];
  document.getElementById('lbl-checkin').textContent = t.checkin;
  document.getElementById('lbl-signin').textContent = t.signin;
  document.getElementById('lbl-signout').textContent = t.signout;
  document.getElementById('lbl-lunch').textContent = t.lunch;
  document.getElementById('lbl-lunchend').textContent = t.lunchend;
  document.getElementById('lbl-todaylog').textContent = t.todaylog;
  document.getElementById('name-input').placeholder = t.placeholder;
  renderLog();
}

function showToast(msg, ok){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>el.className='toast', 3500);
}

async function doAction(type){
  const name = document.getElementById('name-input').value.trim();
  if(!name){ document.getElementById('name-input').focus(); showToast('Please enter your name', false); return; }
  const now = new Date();
  const row = {name, type, ts: now.toISOString()};
  const labels = {signin:'Sign in',signout:'Sign out','lunch-out':'Lunch start','lunch-in':'Lunch end'};
  localLog.unshift({...row, time: now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  renderLog();
  document.getElementById('name-input').value = '';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/timelog`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer':'return=minimal'
      },
      body: JSON.stringify(row)
    });
    if(!res.ok){ const e = await res.text(); throw new Error(res.status+': '+e); }
    showToast(`${name} — ${labels[type]} ${LANGS[lang].saved}`, true);
  } catch(e){
    console.error('Supabase error:', e.message);
    showToast(LANGS[lang].failed + ' (' + e.message + ')', false);
  }
}

function badgeClass(type){
  return {signin:'b-signin',signout:'b-signout','lunch-out':'b-lunchout','lunch-in':'b-lunchin'}[type]||'';
}
function badgeLabel(type){
  return {signin:'Sign in',signout:'Sign out','lunch-out':'Lunch start','lunch-in':'Lunch end'}[type]||type;
}

function renderLog(){
  const el = document.getElementById('log-list');
  if(!localLog.length){ el.innerHTML=`<div class="log-empty">${LANGS[lang].empty}</div>`; return; }
  el.innerHTML = localLog.map(e=>`
    <div class="log-item">
      <div>
        <div class="log-name">${e.name}</div>
        <div class="log-time">${e.time}</div>
      </div>
      <span class="log-badge ${badgeClass(e.type)}">${badgeLabel(e.type)}</span>
    </div>`).join('');
}

async function loadToday(){
  try{
    const now = new Date();
    const start = new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
    const end = new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).toISOString();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/timelog?ts=gte.${encodeURIComponent(start)}&ts=lte.${encodeURIComponent(end)}&order=ts.desc`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) return;
    const data = await res.json();
    if(Array.isArray(data) && data.length){
      localLog = data.map(e=>({...e, time:new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}));
      renderLog();
    }
  } catch(e){ console.error('Load error:',e); }
}

loadToday();
</script>
</body>
</html>
